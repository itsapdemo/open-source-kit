name: Repo Compliance
# Prerequisites:
#   - Enable Dependabot org-wide: Settings > Code security > Dependabot alerts
#   - The dependencies job fetches alerts via GitHub API (free tier)
#   - Secret scanning uses TruffleHog (GitHub's is $19/committer)
#   - Code quality uses local linters/Super-Linter (GitHub CodeQL is $30/committer)
on:
  workflow_call:
    inputs:
      history_depth:
        description: "Secret scan depth (commits); 0 = no history scan"
        type: number
        default: 0
    secrets:
      DEPENDABOT_TOKEN:
        description: "PAT with Dependabot alerts read permission"
        required: false

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write
  pull-requests: read
  statuses: write

jobs:
  # --- License via GitHub API (whitelist MIT/BSD) + WB IGO Rider for MIT ---
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: License from GitHub API
        id: gh-license
        uses: actions/github-script@v7
        with:
          script: |
            const meta = await github.rest.repos.get(context.repo);
            core.setOutput("spdx", meta.data.license?.spdx_id || "");
      - name: Enforce whitelist
        run: |
          SPDX="${{ steps.gh-license.outputs.spdx }}"
          echo "Detected SPDX: ${SPDX:-<none>}"
          case "$SPDX" in
            MIT|BSD-2-Clause|BSD-3-Clause) echo "Whitelisted license: $SPDX" ;;
            "") echo "::error::License missing or undetected"; exit 1 ;;
            *) echo "::error::Non-whitelisted license: $SPDX"; exit 1 ;;
          esac
      - name: Check WB IGO Rider (required for MIT)
        if: steps.gh-license.outputs.spdx == 'MIT'
        run: |
          RIDER_FILE="WB-IGO-RIDER.md"
          CANONICAL_URL="https://raw.githubusercontent.com/worldbank/.github/main/WB-IGO-RIDER.md"

          if [ ! -f "$RIDER_FILE" ]; then
            echo "::error::MIT license requires WB-IGO-RIDER.md file. See: https://github.com/worldbank/.github/blob/main/WB-IGO-RIDER.md"
            exit 1
          fi

          echo "Checking rider content matches canonical version..."
          curl -sSfL "$CANONICAL_URL" -o /tmp/canonical-rider.md

          if ! diff -q "$RIDER_FILE" /tmp/canonical-rider.md >/dev/null 2>&1; then
            echo "::error::WB-IGO-RIDER.md content does not match canonical version at $CANONICAL_URL"
            echo "::group::Diff"
            diff "$RIDER_FILE" /tmp/canonical-rider.md || true
            echo "::endgroup::"
            exit 1
          fi

          echo "WB IGO Rider present and matches canonical version"

  # --- README checks ---
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: itsapdemo/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - run: npm i -g markdownlint-cli
      - name: Lint README
        run: |
          test -f README.md || { echo "::error::Missing README.md"; exit 1; }
          markdownlint README.md || true
      - name: Content checks
        run: python3 .compliance/.github/compliance/check_readme.py

  # --- Languages via GitHub API + framework detection script ---
  tech-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: itsapdemo/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - name: GitHub Languages API
        id: langs
        uses: actions/github-script@v7
        with:
          script: |
            const r = await github.rest.repos.listLanguages(context.repo);
            core.setOutput("languages", JSON.stringify(r.data || {}));
      - name: Print languages
        run: echo '${{ steps.langs.outputs.languages }}'
      - name: Framework/manifest detection
        run: python3 .compliance/.github/compliance/detect_stack.py

  # --- Secrets: TruffleHog secret scanning (free, no license required) ---
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
      - name: TruffleHog deep history scan
        if: ${{ inputs.history_depth > 0 }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog git file://. --no-update --json > trufflehog-results.json 2>/dev/null || true
          if [ -s trufflehog-results.json ]; then
            echo "::warning::Potential secrets found in git history"
            cat trufflehog-results.json | head -50
          else
            echo "No secrets found in history scan"
          fi

  # --- Data file scan (warn/fail per policy) ---
  data-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: itsapdemo/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - name: Check data files
        run: python3 .compliance/.github/compliance/check_data_files.py

  # --- AI usage hints (informational) ---
  ai-usage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: itsapdemo/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - name: Detect AI usage
        run: python3 .compliance/.github/compliance/detect_ai_use.py

  # --- Dependency security via Dependabot API (free) ---
  # Requires Dependabot to be enabled org-wide
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}
        with:
          github-token: ${{ secrets.DEPENDABOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const alerts = await github.rest.dependabot.listAlertsForRepo({
                owner, repo, state: 'open', per_page: 100
              });

              const critical = alerts.data.filter(a => a.security_vulnerability?.severity === 'critical');
              const high = alerts.data.filter(a => a.security_vulnerability?.severity === 'high');
              const medium = alerts.data.filter(a => a.security_vulnerability?.severity === 'medium');
              const low = alerts.data.filter(a => a.security_vulnerability?.severity === 'low');

              // Build summary table
              core.summary.addHeading('Dependabot Security Alerts', 2);
              core.summary.addTable([
                [{ data: 'Severity', header: true }, { data: 'Count', header: true }],
                ['🔴 Critical', String(critical.length)],
                ['🟠 High', String(high.length)],
                ['🟡 Medium', String(medium.length)],
                ['🟢 Low', String(low.length)]
              ]);

              // List critical and high alerts
              if (critical.length + high.length > 0) {
                core.summary.addHeading('Critical & High Severity', 3);
                const items = [...critical, ...high].slice(0, 10).map(a =>
                  `**${a.dependency.package.name}** (${a.dependency.package.ecosystem}): ${a.security_advisory.summary}`
                );
                core.summary.addList(items);
                core.summary.addLink('View all alerts', `https://github.com/${owner}/${repo}/security/dependabot`);
              }

              await core.summary.write();

              // Fail on critical/high
              if (critical.length > 0 || high.length > 0) {
                core.setFailed(`Found ${critical.length} critical and ${high.length} high severity vulnerabilities. Review: https://github.com/${owner}/${repo}/security/dependabot`);
              } else if (alerts.data.length > 0) {
                core.warning(`Found ${alerts.data.length} open Dependabot alerts (no critical/high)`);
              } else {
                core.info('✅ No open Dependabot alerts');
              }
            } catch (e) {
              if (e.status === 404 || e.status === 403) {
                core.warning('Dependabot alerts not accessible. Enable at: Settings > Code security > Dependabot alerts');
              } else {
                throw e;
              }
            }

  # --- Code quality/security: prefer local linters; fallback to Super-Linter ---
  code-quality-basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect & run local linters
        id: local
        run: |
          set -e
          found=0
          if [ -f "package.json" ] && jq -e '.devDependencies.eslint or .dependencies.eslint' package.json >/dev/null; then
            echo "eslint found"; npm ci || npm i; npx eslint . --max-warnings=0; found=1
          fi
          if [ -f "pyproject.toml" ] && grep -q "\[tool.ruff\]" pyproject.toml; then
            echo "ruff config found"; pip install ruff; ruff check .; found=1
          elif [ -f ".flake8" ] || ( [ -f "setup.cfg" ] && grep -q "\[flake8\]" setup.cfg ); then
            echo "flake8 config found"; pip install flake8; flake8 .; found=1
          fi
          if [ $found -eq 0 ]; then echo "fallback=true" >> $GITHUB_OUTPUT; fi

      - name: Super-Linter fallback
        if: steps.local.outputs.fallback == 'true'
        uses: github/super-linter/slim@v6
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Essential linters only
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_PYTHON_FLAKE8: true
          # Disable noisy/duplicate linters
          VALIDATE_JSCPD: false
          VALIDATE_CHECKOV: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_RUFF: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_GITLEAKS: false  # Already handled by secrets job

  # --- SonarCloud (Code Quality) ---
  code-quality-sonar:
    runs-on: ubuntu-latest
    needs: [code-quality-basic]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Create sonar-project.properties on the fly if repo doesn't have one
      - name: Create Sonar properties if missing
        run: |
          if [ ! -f sonar-project.properties ]; then
            REPO_KEY="${{ github.repository }}"           # e.g. org/repo
            SAFE_KEY="${REPO_KEY//\//_}"                  # org_repo
            echo "sonar.organization=${{ secrets.SONAR_ORG_KEY }}"        > sonar-project.properties
            echo "sonar.projectKey=${SAFE_KEY}"           >> sonar-project.properties
            echo "sonar.projectName=${REPO_KEY}"          >> sonar-project.properties
            echo "sonar.sources=."                        >> sonar-project.properties
            echo "sonar.exclusions=**/*.md,**/node_modules/**,**/.venv/**,**/dist/**,**/build/**" >> sonar-project.properties
            echo "sonar.scm.revision=${{ github.sha }}"    >> sonar-project.properties
          fi
          cat sonar-project.properties

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
